<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="UCAI">
  <title>UCAI</title>
  <rect width="400" height="400" rx="48" fill="#0E0E0F"/>

  <!--
    A single jigsaw puzzle piece, centred on the canvas.
    Square base with:
      - a knob (rounded protrusion) on the TOP edge
      - a socket (rounded indent) on the LEFT edge
    Reads as "fits natively into Claude Code" — the puzzle metaphor.

    Built as one continuous filled path — clean silhouette at all sizes.
    Edge length ~200u, knob/socket radius 28u.
  -->
  <path d="
    M 100 130
    L 100 172
    A 28 28 0 0 1 100 228
    L 100 300
    L 300 300
    L 300 130
    L 228 130
    A 28 28 0 0 0 172 130
    Z
  " fill="#E8954A"/>
</svg>
